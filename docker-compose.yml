

services:
  # The Laravel app container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: harmoni-bps-tuban-app
    container_name: harmoni_app
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/bootstrap/cache
      - ./docker/entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    networks:
      - harmoni-network
    depends_on:
      - redis

  # The Laravel queue worker container
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: harmoni-bps-tuban-app
    container_name: harmoni_worker
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/bootstrap/cache
      - ./docker/entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    networks:
      - harmoni-network
    depends_on:
      - redis

  # The Nginx web server container
  web:
    image: nginx:alpine
    container_name: harmoni_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - harmoni-network
    depends_on:
      - app

  # The Redis container
  redis:
    image: redis:alpine
    container_name: harmoni_redis
    restart: unless-stopped
    networks:
      - harmoni-network


networks:
  harmoni-network:
    external: true

volumes:
  dbdata:
    driver: local
