services:
  # Container Aplikasi Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: harmoni-app
    container_name: harmoni-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - harmoni-network

  nginx:
    image: nginx:alpine
    container_name: harmoni-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - harmoni-network

  # Container Database PostgreSQL
  db:
    image: postgres:15-alpine # Pakai versi 15 yang stabil
    container_name: db_harmoni
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - harmoni-network

networks:
  harmoni-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
